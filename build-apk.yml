name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools-version: 34.0.0
        ndk-version: '25.2.9519653'
    
    - name: Install npm dependencies
      run: npm install --legacy-peer-deps
    
    - name: Build Next.js project
      run: npm run build
    
    - name: Check for Android project
      run: |
        if [ ! -d "android" ]; then
          echo "Android project not found, initializing..."
          npx cap add android
        fi
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Make gradlew executable
      run: chmod +x android/gradlew
    
    - name: Build Android APK
      run: cd android && ./gradlew assembleDebug --no-daemon && cd ..
      env:
        GRADLE_OPTS: -Xmx4096m
    
    - name: Verify APK
      run: |
        APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
        if [ ! -f "$APK_PATH" ]; then
          echo "APK not found at $APK_PATH"
          exit 1
        fi
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "APK Size: $((APK_SIZE / 1048576)) MB"
        if [ $APK_SIZE -lt 1048576 ]; then
          echo "APK is too small, build may have failed"
          exit 1
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
        echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
    
    - name: Create output directories
      run: |
        mkdir -p .build-outputs
        mkdir -p APK_DOWNLOAD
    
    - name: Copy APK to output directories
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk .build-outputs/app-debug.apk
        cp android/app/build/outputs/apk/debug/app-debug.apk APK_DOWNLOAD/app-debug.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: |
          .build-outputs/app-debug.apk
          APK_DOWNLOAD/app-debug.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./APK_DOWNLOAD/app-debug.apk
        asset_name: app-debug-${{ github.ref }}.apk
        asset_content_type: application/vnd.android.package-archive
    
    - name: Build Summary
      run: |
        echo "✅ APK Build Complete!"
        echo ""
        echo "📦 APK Details:"
        echo "   Size: $((APK_SIZE / 1048576)) MB ($APK_SIZE bytes)"
        echo "   Location: $APK_PATH"
        echo ""
        echo "📥 Download:"
        echo "   1. Go to Actions → Latest run"
        echo "   2. Download 'app-debug-apk' artifact"
        echo ""
        echo "📱 Install:"
        echo "   adb install app-debug.apk"
